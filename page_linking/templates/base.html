<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}My Flask App{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <header
      class="border-b border-slate-700 bg-slate-900/90 backdrop-blur sticky top-0 z-20"
    >
      <div
        class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-3 px-5 py-4"
      >
        <a
          href="/"
          class="text-2xl font-semibold tracking-tight text-emerald-300"
          >Tailwind Flask</a
        >
        <nav class="flex flex-wrap items-center gap-3 text-sm">
          <a href="/" class="rounded-lg px-3 py-2 transition hover:bg-slate-800"
            >Home</a
          >
          <a
            href="/about"
            class="rounded-lg px-3 py-2 transition hover:bg-slate-800"
            >About</a
          >
          <a
            href="/contact"
            class="rounded-lg px-3 py-2 transition hover:bg-slate-800"
            >Contact</a
          >
          <a
            href="/login"
            class="rounded-lg bg-emerald-400 px-3 py-2 font-semibold text-slate-950 transition hover:bg-emerald-300"
            >Login</a
          >
          <a
            href="/register"
            class="rounded-lg border border-emerald-400 px-3 py-2 text-emerald-300 transition hover:bg-emerald-500/10"
            >Register</a
          >
        </nav>
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-5 py-10">
      {% block content %}{% endblock %}
    </main>

    <footer
      class="border-t border-slate-800 bg-slate-900/90 px-5 py-6 text-center text-sm text-slate-500"
    >
      <p>Designed with Tailwind CSS and Flask.</p>
    </footer>
  </body>
</html>
