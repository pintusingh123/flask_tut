<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Contact — Acme Co.</title>
    <style>
      :root {
        --bg: #f7f9fc;
        --card: #fff;
        --accent: #0b69ff;
        --maxw: 980px;
        --muted: #6b7280;
      }
      body {
        font-family:
          Inter,
          Segoe UI,
          Arial,
          Helvetica,
          sans-serif;
        margin: 0;
        background: var(--bg);
        color: #111;
      }
      header {
        background: linear-gradient(90deg, #0b69ff22, #7cc0ff22);
        padding: 18px 0;
      }
      .nav {
        max-width: var(--maxw);
        margin: 0 auto;
        display: flex;
        gap: 18px;
        align-items: center;
        padding: 0 16px;
      }
      .container {
        max-width: var(--maxw);
        margin: 28px auto;
        padding: 0 16px;
      }
      .card {
        background: var(--card);
        padding: 18px;
        border-radius: 10px;
        border: 1px solid #eef2f7;
      }
      label {
        display: block;
        margin: 8px 0 6px;
        font-weight: 600;
      }
      input,
      textarea {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #e6edf6;
      }
      .btn {
        margin-top: 12px;
        padding: 10px 14px;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        border: 0;
      }
      footer {
        max-width: var(--maxw);
        margin: 28px auto;
        padding: 18px 16px;
        color: var(--muted);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <header>
      <nav class="nav">
        <div class="brand">Acme Co.</div>
        <div style="flex: 1"></div>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/products">Products</a>
        <a href="/services">Services</a>
        <a href="/contact">Contact</a>
        <a href="/feedback">Feedback</a>
      </nav>
    </header>

    <main class="container">
      <div class="card">
        <h1>Contact Us</h1>
        <p>
          If you have questions, please reach out using the form below or email
          us at contact@acme.example.
        </p>
        <form action="/contact" method="post">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" required />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required></textarea>

          <button type="submit" class="btn">Send Message</button>
        </form>
      </div>
    </main>

    <footer>
      © Acme Co. — <span style="color: var(--muted)">contact@acme.example</span>
    </footer>
  </body>
</html>
