<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Services — Acme Co.</title>
    <style>
      :root {
        --bg: #f7f9fc;
        --card: #fff;
        --accent: #0b69ff;
        --maxw: 980px;
      }
      body {
        font-family:
          Inter,
          Segoe UI,
          Arial,
          Helvetica,
          sans-serif;
        margin: 0;
        background: var(--bg);
        color: #111;
      }
      .container {
        max-width: var(--maxw);
        margin: 28px auto;
        padding: 0 16px;
      }
      .list {
        display: grid;
        gap: 12px;
      }
      .item {
        background: var(--card);
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #eef2f7;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Services</h1>
      <p>We provide a range of services to help you succeed.</p>
      <section class="list" style="margin-top: 12px">
        <div class="item">
          <strong>Consulting</strong> — Product strategy and architecture
          guidance.
        </div>
        <div class="item">
          <strong>Implementation</strong> — Custom integrations and migration
          services.
        </div>
        <div class="item">
          <strong>Support</strong> — 24/7 enterprise support plans.
        </div>
      </section>
    </main>
  </body>
</html>
