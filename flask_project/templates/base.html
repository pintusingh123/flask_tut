<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}My Flask App{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="/static/js/sidebar.js"></script>
  </head>
  <body class="m-0 p-0 bg-slate-900 text-slate-100">
    <div class="flex flex-col min-h-screen">
      <!-- Header Section -->

      <header
        class="w-full h-20 bg-gradient-to-r from-sky-950 via-sky-800 to-sky-600 flex items-center justify-between px-4 md:px-6 shadow-2xl relative"
      >
        <div>
          <h1 class="text-4xl font-bold text-white tracking-tight">
            My Flask Website
          </h1>
          <p class="text-white/80 text-sm">
            Modern sky & slate styling for a clean interface
          </p>
        </div>
        <!-- Mobile Menu Icon -->
        <button
          id="mobileMenuBtn"
          class="md:hidden text-white text-2xl cursor-pointer focus:outline-none"
          onclick="toggleSidebar()"
        >
          <i class="fas fa-bars"></i>
        </button>
      </header>

      <!-- Navbar Section -->
      <nav class="w-full sticky top-0 z-50 bg-slate-900/80 backdrop-blur-sm shadow-xl border-b border-sky-500">
        <div class="flex items-center justify-center space-x-6 md:space-x-8 px-4 md:px-6 py-3">
          <a
            href="/home"
            class="text-white hover:text-sky-200 font-semibold transition duration-300"
            >Home</a
          >
          <a
            href="/about"
            class="text-white hover:text-sky-200 font-semibold transition duration-300"
            >About</a
          >
          <a
            href="/admin-login"
            class="text-white hover:text-sky-200 font-semibold transition duration-300"
            >Admin Login</a
          >
          <a
            href="/blog"
            class="text-white hover:text-sky-200 font-semibold transition duration-300"
            >Blog & Articals</a
          >
        </div>
      </nav>

      <!-- Main Content and Sidebar -->
      <div class="flex flex-1 overflow-hidden">
        <!-- Content Section -->
        <main class="flex-1 bg-slate-900/80 overflow-auto p-0 text-slate-200">
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>
  </body>
</html>
