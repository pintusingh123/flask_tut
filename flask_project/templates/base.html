<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}My Flask App{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="/static/js/sidebar.js"></script>
  </head>
  <body class="m-0 p-0 bg-slate-950 text-slate-100">
    <div class="flex flex-col h-screen">
      <!-- Header Section -->
       
      <header
        class="w-full h-20 bg-gradient-to-r from-cyan-600 via-sky-600 to-indigo-700 flex items-center justify-between px-6 shadow-2xl relative"
      >
        <div>
          <h1 class="text-4xl font-bold text-white tracking-tight">
            My Flask Website
          </h1>
          <p class="text-sm text-cyan-100/80">
            Modern, vivid color styling for a stronger interface
          </p>
        </div>
        <!-- Mobile Menu Icon -->
        <button
          id="mobileMenuBtn"
          class="md:hidden text-white text-2xl cursor-pointer focus:outline-none"
          onclick="toggleSidebar()"
        >
          <i class="fas fa-bars"></i>
        </button>
      </header>

      <!-- Navbar Section -->
      <nav class="w-full bg-slate-900 shadow-xl">
        <div class="flex items-center justify-center space-x-8 px-6 py-4">
          <a
            href="/"
            class="text-slate-100 hover:text-cyan-300 font-semibold transition duration-300"
            >Home</a
          >
          <a
            href="/about"
            class="text-slate-100 hover:text-cyan-300 font-semibold transition duration-300"
            >About</a
          >
          <a
            href="/admin-login"
            class="text-slate-100 hover:text-cyan-300 font-semibold transition duration-300"
            >Admin Login</a
          >
          <a
            href="/contactus"
            class="text-slate-100 hover:text-cyan-300 font-semibold transition duration-300"
            >Contact Us</a
          >
        </div>
      </nav>

      <!-- Main Content and Sidebar -->
      <div class="flex flex-1 overflow-hidden">
        <!-- Content Section -->
        <main class="flex-1 bg-slate-950 overflow-auto py-12 px-4 md:px-8">
          {% block content %}{% endblock %}
        </main>

        <!-- Sidebar -->
        <!-- Mobile Overlay -->
        <div
          id="sidebarOverlay"
          class="fixed inset-0 bg-black bg-opacity-60 md:hidden hidden z-30 transition-opacity duration-300"
          onclick="toggleSidebar()"
        ></div>

        <!-- Sidebar -->
        <aside
          id="sidebar"
          class="fixed right-0 top-20 h-[calc(100vh-80px)] w-56 bg-slate-900 shadow-2xl transform translate-x-full md:translate-x-0 md:relative md:top-0 md:h-auto transition-transform duration-300 ease-in-out z-40 md:z-auto overflow-y-auto"
        >
          <div class="p-6 space-y-6">
            <!-- Sidebar Header -->
            <div class="border-b border-slate-700 pb-4">
              <h3 class="text-white font-bold text-xl">Dashboard</h3>
              <p class="text-slate-400 text-sm mt-1">Quick actions</p>
            </div>

            <!-- Sidebar Menu Items -->
            <nav class="space-y-3">
              <a
                href="#"
                class="flex items-center space-x-3 text-slate-100 hover:bg-slate-700 px-4 py-3 rounded-2xl transition duration-300"
              >
                <i class="fas fa-user text-cyan-300"></i>
                <span>Profile</span>
              </a>
              <a
                href="#"
                class="flex items-center space-x-3 text-slate-100 hover:bg-slate-700 px-4 py-3 rounded-2xl transition duration-300"
              >
                <i class="fas fa-chart-bar text-cyan-300"></i>
                <span>Analytics</span>
              </a>
              <a
                href="#"
                class="flex items-center space-x-3 text-slate-100 hover:bg-slate-700 px-4 py-3 rounded-2xl transition duration-300"
              >
                <i class="fas fa-file text-cyan-300"></i>
                <span>Reports</span>
              </a>
            </nav>

            <!-- Sidebar Footer -->
            <div class="border-t border-slate-700 pt-4">
              <a
                href="#"
                class="flex items-center space-x-3 text-slate-100 hover:bg-slate-700 px-4 py-3 rounded-2xl transition duration-300"
              >
                <i class="fas fa-sign-out-alt text-cyan-300"></i>
                <span>Logout</span>
              </a>
            </div>
          </div>
        </aside>
      </div>
    </div>

  
  </body>
</html>
