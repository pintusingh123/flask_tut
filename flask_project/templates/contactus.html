{% extends "base.html" %} {% block title %}Contact Us - My Flask App{% endblock
%} {% block content %}
<div
  class="min-h-[calc(100vh-16rem)] flex items-start justify-center px-4 py-12 sm:px-6 lg:px-8"
>
  <div
    class="w-full max-w-xl bg-slate-900/95 border border-slate-800 rounded-[2rem] p-8 shadow-2xl"
  >
    <h2 class="text-4xl font-extrabold text-white mb-4 text-center">
      Contact Us
    </h2>
    <p class="text-sm text-slate-400 mb-8 text-center">
      Send us a message and we’ll get back to you shortly.
    </p>
    <form class="space-y-5">
      <div>
        <label class="block text-slate-200 font-semibold mb-2">Name</label>
        <input
          type="text"
          placeholder="Your name"
          class="w-full px-4 py-3 bg-slate-800 border border-slate-700 text-slate-100 rounded-2xl focus:outline-none focus:border-cyan-400 focus:ring-2 focus:ring-cyan-500/20"
        />
      </div>
      <div>
        <label class="block text-slate-200 font-semibold mb-2">Email</label>
        <input
          type="email"
          placeholder="Your email"
          class="w-full px-4 py-3 bg-slate-800 border border-slate-700 text-slate-100 rounded-2xl focus:outline-none focus:border-cyan-400 focus:ring-2 focus:ring-cyan-500/20"
        />
      </div>
      <div>
        <label class="block text-slate-200 font-semibold mb-2">Message</label>
        <textarea
          placeholder="Your message"
          rows="5"
          class="w-full px-4 py-3 bg-slate-800 border border-slate-700 text-slate-100 rounded-2xl focus:outline-none focus:border-cyan-400 focus:ring-2 focus:ring-cyan-500/20"
        ></textarea>
      </div>
      <button
        type="submit"
        class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-semibold py-3 rounded-2xl transition duration-300"
      >
        Send Message
      </button>
    </form>
  </div>
</div>
{% endblock %}
