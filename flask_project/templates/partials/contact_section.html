<section
  id="contact"
  class="w-full min-h-[calc(100vh-20rem)] bg-transparent py-16"
>
  <div class="container mx-auto px-6 lg:px-12">
    <div class="max-w-5xl mx-auto grid gap-8 lg:grid-cols-2 items-start">
      <div class="space-y-4">
        <h3 class="text-2xl font-bold text-slate-100">Get in touch</h3>
        <p class="text-slate-300">
          Questions or feedback? Reach out and we'll get back to you within 2
          business days.
        </p>

        <div class="mt-6 grid gap-4 sm:grid-cols-2">
          <div class="rounded-lg bg-slate-800/70 p-4">
            <p class="text-sm text-slate-300">Email</p>
            <a
              href="mailto:hello@example.com"
              class="text-emerald-300 font-semibold"
              >hello@example.com</a
            >
          </div>
          <div class="rounded-lg bg-slate-800/70 p-4">
            <p class="text-sm text-slate-300">Phone</p>
            <p class="text-sky-300 font-semibold">+1 (555) 123-4567</p>
          </div>
        </div>

        
      </div>

      <div>
        <div class="bg-slate-800/80 border border-sky-500 rounded-xl p-6">
          <h4 class="text-sm font-semibold text-slate-100">
            Send a quick message
          </h4>
          <p class="text-sm text-slate-300 mt-2">
            Use the contact form for detailed requests — we aim to respond
            quickly.
          </p>
          <div class="mt-4">
            <form action="/contactus" method="post" class="space-y-3">
              <input
                type="text"
                name="name"
                placeholder="Your name"
                class="w-full px-3 py-2 rounded-lg bg-sky-950/60 border border-sky-500 text-slate-100"
              />
              <input
                type="email"
                name="email"
                placeholder="Email"
                class="w-full px-3 py-2 rounded-lg bg-sky-950/60 border border-sky-500 text-slate-100"
              />
              <textarea
                name="message"
                rows="4"
                placeholder="Message"
                class="w-full px-3 py-2 rounded-lg bg-sky-950/60 border border-sky-500 text-slate-100"
              ></textarea>
              <button
                type="submit"
                class="bg-sky-500 hover:bg-sky-600 text-white px-4 py-2 rounded-lg"
              >
                Send
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
