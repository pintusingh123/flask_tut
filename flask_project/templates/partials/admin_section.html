<section
  id="admin"
  class="w-full min-h-[calc(100vh-20rem)]    bg-transparent md-py-3 py-16"
>
  <div class="container  mx-auto px-6 lg:px-12">
    <div class="max-w-5xl mx-auto grid gap-6 lg:grid-cols-3 items-stretch">
      <div class="rounded-2xl bg-slate-800/80 border border-sky-500 p-6">
        <h3 class="text-lg font-semibold text-slate-100">Admin Panel</h3>
        <p class="text-slate-300 mt-2">
          Quick access to admin tools and reports.
        </p>
        <div class="mt-4 space-y-2">
          <a
            href="/admin-home"
            class="inline-flex items-center gap-2 bg-sky-500 hover:bg-sky-600 text-white font-semibold px-3 py-2 rounded-lg"
            >Open Dashboard</a
          >
        </div>
      </div>

      <div class="rounded-2xl bg-slate-800/80 border border-sky-500 p-6">
        <h4 class="text-sm font-semibold text-slate-100">Stats</h4>
        <div class="mt-4 grid grid-cols-2 gap-4">
          <div class="p-3 bg-slate-900/50 rounded-lg">
            <p class="text-xs text-slate-300">Employees</p>
            <p class="text-xl font-bold text-slate-100">
              {{ employees_count or '—' }}
            </p>
          </div>
          <div class="p-3 bg-slate-900/50 rounded-lg">
            <p class="text-xs text-slate-300">Tasks</p>
            <p class="text-xl font-bold text-slate-100">
              {{ tasks_count or '—' }}
            </p>
          </div>
        </div>
      </div>

      <div class="rounded-2xl bg-slate-800/80 border border-sky-500 p-6">
        <h4 class="text-sm font-semibold text-slate-100">Actions</h4>
        <div class="mt-4 flex flex-col gap-3">
          <a
            href="/add-employee"
            class="inline-flex items-center gap-2 bg-sky-500 hover:bg-sky-600 text-white font-semibold px-3 py-2 rounded-lg"
            >Add Employee</a
          >
          <a
            href="/show-employees"
            class="inline-flex items-center gap-2 border border-sky-500 text-slate-200 px-3 py-2 rounded-lg hover:bg-emerald-500/5"
            >View Employees</a
          >
        </div>
      </div>
    </div>
  </div>
</section>
