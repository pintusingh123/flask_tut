{% extends "base.html" %} {% block title %}Admin Login - My Flask App{% endblock
%} {% block content %}
<div class="h-full flex items-center justify-center px-6">
  <div
    class="max-w-md w-full bg-slate-900/95 border border-slate-800 rounded-[2rem] p-10 shadow-2xl"
  >
    <h2 class="text-4xl font-extrabold text-white mb-8 text-center">
      Admin Login
    </h2>
    <form action="/admin" method="post" class="space-y-6">
      <div>
        <label class="block text-slate-200 font-semibold mb-2">Username</label>
        <input
          type="text"
          name="username"
          placeholder="Enter your username"
          class="w-full px-4 py-3 bg-slate-800 border border-slate-700 text-slate-100 rounded-2xl focus:outline-none focus:border-cyan-400 focus:ring-2 focus:ring-cyan-500/20"
        />
      </div>
      <div>
        <label class="block text-slate-200 font-semibold mb-2">Password</label>
        <input
          type="password"
          name="password"
          placeholder="Enter your password"
          class="w-full px-4 py-3 bg-slate-800 border border-slate-700 text-slate-100 rounded-2xl focus:outline-none focus:border-cyan-400 focus:ring-2 focus:ring-cyan-500/20"
        />
      </div>
      <button
        type="submit"
        class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-semibold py-3 rounded-2xl transition duration-300"
      >
        Login
      </button>
    </form>
  </div>
</div>
{% endblock %}
