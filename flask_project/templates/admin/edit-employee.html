{% extends "admin/admin.html" %} {% block title %}Update Employee - My Flask
App{% endblock %} {% block content %}
<div class="min-h-[calc(100vh-8rem)] flex items-center">
  <div
    class="max-w-3xl mx-auto rounded-3xl bg-slate-800/80 border border-emerald-500 p-10 shadow-2xl"
  >
    <h2 class="text-4xl font-bold text-slate-100 mb-4">Update Employee</h2>

    <form action="/update/{{ employee[0] }}" method="POST" class="space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-emerald-300"
            >Full name</label
          >
          <input
            type="text"
            name="name"
            value="{{ employee[1] }}"
            class="mt-1 w-full rounded-lg bg-emerald-950/60 border border-emerald-500 p-2 text-slate-100"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-emerald-300"
            >Email</label
          >
          <input
            type="email"
            name="email"
            value="{{ employee[2] }}"
            class="mt-1 w-full rounded-lg bg-emerald-950/60 border border-emerald-500 p-2 text-slate-100"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-emerald-300"
            >Phone</label
          >
          <input
            type="text"
            name="mobile"
            value="{{ employee[3] }}"
            class="mt-1 w-full rounded-lg bg-emerald-950/60 border border-emerald-500 p-2 text-slate-100"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-emerald-300"
            >Salary</label
          >
          <input
            type="text"
            name="salary"
            value="{{ employee[4] }}"
            class="mt-1 w-full rounded-lg bg-emerald-950/60 border border-emerald-500 p-2 text-slate-100"
          />
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-emerald-300"
            >Position</label
          >
          <input
            type="text"
            name="position"
            value="{{ employee[5] }}"
            class="mt-1 w-full rounded-lg bg-emerald-950/60 border border-emerald-500 p-2 text-slate-100"
          />
        </div>
      </div>

      <div class="flex items-center justify-end gap-3">
        <button
          type="submit"
          class="bg-emerald-500 hover:bg-emerald-600 text-white py-2 px-6 rounded-2xl transition duration-300"
        >
          Update Employee
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
