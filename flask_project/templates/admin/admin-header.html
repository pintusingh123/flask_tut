<!-- Admin header partial: include this from admin pages -->
<header
  class="w-full h-20 bg-gradient-to-r from-sky-950 via-sky-800 to-sky-600 flex items-center justify-between px-6 shadow-2xl relative"
>
  <div>
    <h1 class="text-4xl font-bold text-slate-100 tracking-tight">
      Admin Panel
    </h1>
    <p class="text-sm text-slate-300/80">Admin interface</p>
  </div>

  <!-- Mobile Menu Icon -->
  <button
    id="mobileMenuBtn"
    class="md:hidden text-slate-100 text-2xl cursor-pointer focus:outline-none"
    onclick="toggleSidebar()"
  >
    <i class="fas fa-bars"></i>
  </button>
</header>

<!-- Navbar Section -->
<nav
  class="w-full sticky top-0 z-50 bg-slate-900/80 backdrop-blur-sm shadow-xl border-b border-sky-500/50"
>
  <div class="flex items-center justify-between px-6 py-4">
    <!-- Left Navigation Links -->
    <div class="flex items-center justify-center space-x-8">
      <a
        href="/admin-home"
        class="text-slate-100 hover:text-sky-200 font-semibold transition duration-300"
        >Admin</a
      >
      <a
        href="/add-employee"
        class="text-slate-100 hover:text-sky-200 font-semibold transition duration-300"
        >Add employee</a
      >
      <a
        href="/search-employee"
        class="text-slate-100 hover:text-sky-200 font-semibold transition duration-300"
        >Search Employee</a
      >
      <a
        href="/show-employees"
        class="text-slate-100 hover:text-sky-200 font-semibold transition duration-300"
        >Show Employees</a
      >
    </div>

    <!-- Profile Image Dropdown -->
    <div class="relative group">
      <a href="/profile-page">
        <img
          src="/static/images/profile.png"
          alt="Profile"
          class="w-11 h-11 bg-sky-200 border border-sky-500/70 rounded-full cursor-pointer"
          onerror="
            this.src =
              'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%2302569b%22/></svg>'
          "
        />
      </a>
    </div>
  </div>
</nav>
