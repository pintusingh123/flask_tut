<!-- Admin header partial: include this from admin pages -->
<header
  class="w-full h-20 bg-gradient-to-r from-cyan-600 via-sky-600 to-indigo-700 flex items-center justify-between px-6 shadow-2xl relative"
>
  <div>
    <h1 class="text-4xl font-bold text-white tracking-tight">
      My Flask Website
    </h1>
    <p class="text-sm text-cyan-100/80">Admin interface</p>
  </div>

  <!-- Mobile Menu Icon -->
  <button
    id="mobileMenuBtn"
    class="md:hidden text-white text-2xl cursor-pointer focus:outline-none"
    onclick="toggleSidebar()"
  >
    <i class="fas fa-bars"></i>
  </button>
</header>

<!-- Navbar Section -->
<nav class="w-full bg-slate-900 shadow-xl">
  <div class="flex items-center justify-between px-6 py-4">
    <!-- Left Navigation Links -->
    <div class="flex items-center justify-center space-x-8">
      <a
        href="/admin-home"
        class="text-slate-100 hover:text-cyan-300 font-semibold transition duration-300"
        >Admin</a
      >
      <a
        href="/add-employee"
        class="text-slate-100 hover:text-cyan-300 font-semibold transition duration-300"
        >Add employee</a
      >
      <a
        href="/search-employee"
        class="text-slate-100 hover:text-cyan-300 font-semibold transition duration-300"
        >Search Employee</a
      >
      <a
        href="/show-employees"
        class="text-slate-100 hover:text-cyan-300 font-semibold transition duration-300"
        >Show Employees</a
      >
    </div>

    <!-- Profile Image Dropdown -->
    <div class="relative group">
      <a href="/profile-page">
        <img
