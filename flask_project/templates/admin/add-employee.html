{% extends "admin/admin.html" %} {% block title %}Add Employee - My Flask App{%
endblock %} {% block content %}
<div class="min-h-[calc(100vh-8rem)] flex items-center">
  <div
    class="max-w-3xl mx-auto rounded-3xl bg-slate-800/80 border border-sky-500 p-10 shadow-2xl w-full"
  >
    <h2 class="text-4xl font-bold text-slate-100 mb-4">Add Employee</h2>

    {% if success %}
    <div class="mb-4 rounded-lg bg-sky-900/60 p-4 text-slate-100 border border-sky-500/40">
      {{ success }}
    </div>
    {% endif %}

    {% if error %}
    <div class="mb-4 rounded-lg bg-rose-950/60 p-4 text-rose-100 border border-rose-500/40">
      {{ error }}
    </div>
    {% endif %}

    <form action="/add-employee-save" method="post" class="space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-sky-200"
            >Emp id</label
          >
          <input
            type="text"
            name="emp_id"
            required
            value="{{ (form.emp_id if form else '') }}"
            class="mt-1 w-full rounded-lg bg-slate-950/40 border border-sky-500/50 p-2 text-slate-100 focus:outline-none focus:ring-2 focus:ring-sky-500"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-sky-200"
            >Full name</label
          >
          <input
            type="text"
            name="full_name"
            required
            value="{{ (form.full_name if form else '') }}"
            class="mt-1 w-full rounded-lg bg-slate-950/40 border border-sky-500/50 p-2 text-slate-100 focus:outline-none focus:ring-2 focus:ring-sky-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-sky-200"
            >Email</label
          >
          <input
            type="email"
            name="email"
            required
            value="{{ (form.email if form else '') }}"
            class="mt-1 w-full rounded-lg bg-slate-950/40 border border-sky-500/50 p-2 text-slate-100 focus:outline-none focus:ring-2 focus:ring-sky-500"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-sky-200"
            >Phone</label
          >
          <input
            type="tel"
            name="mobile"
            value="{{ (form.mobile if form else '') }}"
            class="mt-1 w-full rounded-lg bg-slate-950/40 border border-sky-500/50 p-2 text-slate-100 focus:outline-none focus:ring-2 focus:ring-sky-500"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-sky-200"
            >Salary</label
          >
          <input
            type="number"
            step="0.01"
            name="salary"
            value="{{ (form.salary if form else '') }}"
            class="mt-1 w-full rounded-lg bg-slate-950/40 border border-sky-500/50 p-2 text-slate-100 focus:outline-none focus:ring-2 focus:ring-sky-500"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-sky-200"
            >Position</label
          >
          <input
            type="text"
            name="position"
            value="{{ (form.position if form else '') }}"
            class="mt-1 w-full rounded-lg bg-slate-950/40 border border-sky-500/50 p-2 text-slate-100 focus:outline-none focus:ring-2 focus:ring-sky-500"
          />
        </div>
      </div>

      <div class="flex items-center justify-end gap-3">
        <input
          type="submit"
          value="Register"
          name="Register"
          id="Register"
          class="bg-sky-500 hover:bg-sky-600 text-white py-2 px-6 rounded-2xl transition duration-300 cursor-pointer font-semibold"
        />
      </div>
    </form>
  </div>
</div>
{% endblock %}
