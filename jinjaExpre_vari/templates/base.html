<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}My Flask App{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <header
      class="border-b border-slate-700 bg-slate-900/90 backdrop-blur sticky top-0 z-20"
    >
      <div
        class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-3 px-5 py-4"
      >
        <a
          href="/"
          class="text-2xl font-semibold tracking-tight text-emerald-300"
          >Tailwind Flask</a
        >
        
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-5 py-10">
      {% block content %}{% endblock %}
    </main>

    <footer
      class="border-t border-slate-800 bg-slate-900/90 px-5 py-6 text-center text-sm text-slate-500"
    >
      <p>Designed with Tailwind CSS and Flask.</p>
    </footer>
  </body>
</html>
